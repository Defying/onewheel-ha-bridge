[vesc]
# Replace with your VESC TCP bridge host/IP.
host = "127.0.0.1"
port = 65102
thor_can_id = 3
bms_can_id = 4
timeout_seconds = 3.0
poll_interval_seconds = 2.0
static_refresh_every_polls = 30

[mqtt]
# Replace with your MQTT broker host/IP.
host = "homeassistant.local"
port = 1883
username = ""
password = ""
client_id = "onewheel-ha-bridge"
keepalive_seconds = 30

[home_assistant]
discovery_prefix = "homeassistant"
base_topic = "onewheel/custom_xr"
device_name = "Custom Onewheel"
device_id = "custom_onewheel"
manufacturer = "Custom / VESC"
model = "Thor400v2 + ENNOID XLITE 32 V4"
controller_name = "Thor400v2"
bms_name = "ENNOID-XLITE-32-V4"

[discovery]
# Read-only network discovery is disabled by default. When enabled, probes send
# only COMM_FW_VERSION to configured hosts/networks and auto-add discovered
# boards as additional HA MQTT devices. The configured [vesc] host keeps its
# existing topics/device ID for backward compatibility.
enabled = false
# hosts = ["192.168.1.50", "192.168.1.51"]
# networks = ["192.168.1.0/24"]
ports = [65102]
scan_interval_seconds = 60.0
probe_timeout_seconds = 0.35
max_workers = 32
max_hosts_per_scan = 256
max_probes_per_scan = 512
# Default refuses broader-than-/24 CIDRs unless you deliberately lower this.
min_ipv4_prefix_length = 24
include_configured_host = true
# Keep controls disabled for auto-discovered boards unless you explicitly opt in.
controls_enabled_for_discovered = false

[controls]
# Guarded write controls are disabled by default. Enable only if you accept
# Home Assistant buttons for allow charging / force balancing.
enabled = false
# Refloat LED on/off buttons are a separate second opt-in because they use a
# custom-app write path. They are shown only for supported Refloat 1.2+ profiles.
refloat_led_controls_enabled = false
# Defaults to "<home_assistant.base_topic>/command" if blank/commented.
# command_topic = "onewheel/custom_xr/command"
# Defaults to "<home_assistant.base_topic>/command_status" if blank/commented.
# status_topic = "onewheel/custom_xr/command_status"
require_safe_state = true
max_control_speed_mph = 0.5
command_cooldown_seconds = 1.0
